<!DOCTYPE html>
<html>
<head>
<title>2048</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;background:#faf8ef;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;font-family:Arial}
#game{width:300px;height:300px;background:#bbada0;border-radius:6px;display:grid;grid-template:repeat(4,1fr)/repeat(4,1fr);gap:8px;padding:8px}
.tile{background:#cdc1b4;display:flex;justify-content:center;align-items:center;font-size:32px;font-weight:bold;border-radius:4px;color:#776e65}
#score{font-size:20px;margin-bottom:10px}
#btns{display:grid;grid-template-columns:60px 60px 60px;grid-template-rows:60px 60px;gap:5px;margin-top:10px}
button{background:#8f7a66;color:#fff;border:none;font-size:24px;border-radius:8px}
#up{grid-column:2;grid-row:1}
#left{grid-column:1;grid-row:2}
#right{grid-column:3;grid-row:2}
#down{grid-column:2;grid-row:2}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="game"></div>
<div id="btns">
<button id="up">▲</button><button id="left">◀</button><button id="right">▶</button><button id="down">▼</button>
</div>
<script>
let board=Array(4).fill().map(()=>Array(4).fill(0)),score=0;
function addTile(){const e=[];board.forEach((r,i)=>r.forEach((c,j)=>{if(c===0)e.push({i,j})}));if(e.length){const {i,j}=e[Math.floor(Math.random()*e.length)];board[i][j]=Math.random()<0.9?2:4}}
function draw(){const g=document.getElementById('game');g.innerHTML='';board.forEach(r=>r.forEach(v=>{const t=document.createElement('div');t.className='tile';if(v>0){t.textContent=v;t.setAttribute('data-value',v)}g.appendChild(t)}));document.getElementById('score').textContent='Score: '+score}
function move(dir){
let moved=false;const old=JSON.parse(JSON.stringify(board));
const rot=(b)=>{const n=Array(4).fill().map(()=>Array(4).fill(0));for(let i=0;i<4;i++)for(let j=0;j<4;j++)n[j][3-i]=b[i][j];return n}
if(dir===0)board=rot(rot(board));if(dir===1)board=rot(rot(rot(board)));if(dir===3)board=rot(board);
for(let i=0;i<4;i++){let row=board[i].filter(v=>v);for(let j=0;j<row.length-1;j++){if(row[j]===row[j+1]){row[j]*=2;score+=row[j];row.splice(j+1,1);row.push(0);moved=true}}while(row.length<4)row.push(0);board[i]=row}
if(dir===0)board=rot(rot(board));if(dir===1)board=rot(board);if(dir===3)board=rot(rot(rot(board)));
if(JSON.stringify(board)!==old){addTile();draw()}
}
addTile();addTile();draw();
document.getElementById('up').addEventListener('click',()=>move(1));
document.getElementById('down').addEventListener('click',()=>move(3));
document.getElementById('left').addEventListener('click',()=>move(0));
document.getElementById('right').addEventListener('click',()=>move(2));
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(0);if(e.key==='ArrowRight')move(2);if(e.key==='ArrowUp')move(1);if(e.key==='ArrowDown')move(3)});
</script>
</body>
</html>
