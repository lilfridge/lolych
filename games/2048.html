<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Лолыч 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0f0f1a;display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:100vh;font-family:Arial,sans-serif;
  touch-action:manipulation;user-select:none;transition:background .3s;
}
body.light{background:#faf8ef}
body.purple{background:#1a1a3a}
#header{display:flex;align-items:center;gap:8px;margin-bottom:2px}
#header .logo{font-size:26px}
#header .title{color:#e94560;font-size:22px;font-weight:bold}
#timer{color:#ffd93d;font-size:18px;font-weight:bold;height:24px;text-align:center;margin-bottom:2px}
#scores{display:flex;gap:10px;margin-bottom:2px;color:#ccc;font-size:11px;flex-wrap:wrap;justify-content:center}
#progressBar{width:290px;height:5px;background:#1a1a2e;border-radius:3px;margin-bottom:6px;overflow:hidden}
#progressFill{height:100%;background:#e94560;transition:width .3s;width:0%}
#achieve{color:#f0c040;font-size:14px;font-weight:bold;height:20px;text-align:center;margin-bottom:4px}
#boardWrap{position:relative;width:302px;height:302px}
#boardBg{position:absolute;top:8px;left:8px;display:grid;grid-template-columns:repeat(4,68px);grid-template-rows:repeat(4,68px);gap:6px}
.bgCell{width:68px;height:68px;background:#252540;border-radius:10px}
body.light .bgCell{background:rgba(238,228,218,.35)}
body.purple .bgCell{background:#1a1a3a}
#tiles{position:absolute;top:8px;left:8px;width:296px;height:296px}
.tile{
  position:absolute;width:68px;height:68px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:bold;color:#fff;
  transition:transform .12s ease;
  will-change:transform;transform:translateZ(0);
  z-index:1;
}
.tile[data-v="2"]{background:#2e4a3e}.tile[data-v="4"]{background:#3a6a56}
.tile[data-v="8"]{background:#4a8a6e}.tile[data-v="16"]{background:#5aaa86}
.tile[data-v="32"]{background:#6aca9e}.tile[data-v="64"]{background:#e94560}
.tile[data-v="128"]{background:#ff6b6b}.tile[data-v="256"]{background:#ffd93d;color:#000}
.tile[data-v="512"]{background:#6c5ce7}.tile[data-v="1024"]{background:#00cec9}
.tile[data-v="2048"]{background:#ff9ff3}
body.light .tile{color:#5c4e3d;text-shadow:0 1px 2px rgba(0,0,0,.1)}
body.light .tile[data-v="2"]{background:#eee4da}body.light .tile[data-v="4"]{background:#ede0c8}
body.light .tile[data-v="8"]{background:#f2b179;color:#f9f6f2}body.light .tile[data-v="16"]{background:#f59563;color:#f9f6f2}
body.light .tile[data-v="32"]{background:#f67c5f;color:#f9f6f2}body.light .tile[data-v="64"]{background:#f65e3b;color:#f9f6f2}
body.light .tile[data-v="128"]{background:#edcf72;color:#f9f6f2}body.light .tile[data-v="256"]{background:#edcc61;color:#f9f6f2}
body.light .tile[data-v="512"]{background:#edc850;color:#f9f6f2}body.light .tile[data-v="1024"]{background:#edc53f;color:#f9f6f2}
body.light .tile[data-v="2048"]{background:#edc22e;color:#f9f6f2}
body.purple .tile{background:#2a2a4a;color:#dcd}
body.purple .tile[data-v="2"]{background:#3a3a5a}body.purple .tile[data-v="4"]{background:#4a4a6a}
body.purple .tile[data-v="8"]{background:#5a5a7a}body.purple .tile[data-v="16"]{background:#6a6a8a}
body.purple .tile[data-v="32"]{background:#7a7a9a}body.purple .tile[data-v="64"]{background:#e94560}
body.purple .tile[data-v="128"]{background:#ff6b6b}body.purple .tile[data-v="256"]{background:#ffd93d;color:#000}
body.purple .tile[data-v="512"]{background:#6c5ce7}body.purple .tile[data-v="1024"]{background:#00cec9}
.tile.new{animation:popIn .25s ease}
.tile.merged{animation:mergeBounce .2s ease}
.tile.glow{box-shadow:0 0 20px rgba(255,255,255,.5)}
@keyframes popIn{0%{transform:translateZ(0) scale(0);opacity:0}60%{transform:translateZ(0) scale(1.1)}100%{transform:translateZ(0) scale(1);opacity:1}}
@keyframes mergeBounce{0%{transform:translateZ(0) scale(1)}40%{transform:translateZ(0) scale(1.3)}100%{transform:translateZ(0) scale(1)}}
#scorePopup{position:fixed;pointer-events:none;z-index:200;color:#ffd93d;font-size:20px;font-weight:bold;text-shadow:0 0 10px rgba(255,217,61,.5);animation:flyUp .8s ease-out forwards}
@keyframes flyUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-50px)}}
#btns{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px;gap:5px;margin-top:8px}
#btns button{background:#252540;color:#fff;border:none;font-size:20px;border-radius:8px;cursor:pointer;transition:background .1s}
#btns button:active{background:#e94560}
#up{grid-column:2;grid-row:1}#left{grid-column:1;grid-row:2}#right{grid-column:3;grid-row:2}#down{grid-column:2;grid-row:2}
#modeBtns{display:flex;gap:8px;margin-top:6px}
#modeBtns button{border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;color:#fff;background:#252540}
#modeBtns button.active{background:#e94560}
#skinBtns{display:flex;gap:6px;margin-top:6px}
#skinBtns button{border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:10px;color:#fff}
#skinDark{background:#1a1a2e}#skinLight{background:#cdc1b4;color:#000}#skinPurple{background:#1a1a3a}
#hint{color:#555;font-size:10px;margin-top:4px}
#over{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  flex-direction:column;align-items:center;justify-content:center;z-index:10;color:#fff;
}
#over h2{font-size:30px;color:#e94560;margin-bottom:8px}
#over p{font-size:15px;margin:4px 0}
#over button{background:#e94560;color:#fff;border:none;padding:10px 24px;font-size:15px;border-radius:8px;margin:6px 4px 0;cursor:pointer}
#over .share{background:#25D366}
canvas#fireworks{position:fixed;inset:0;pointer-events:none;z-index:100}
</style>
</head>
<body>
<div id="header"><span class="logo">🃏</span><span class="title">Лолыч 2048</span></div>
<div id="timer"></div>
<div id="scores">
  <span>🏆 <b id="score">0</b></span>
  <span>👣 <b id="moves">0</b></span>
  <span>📦 <b id="bestTile">-</b></span>
  <span>🔥 <b id="best">0</b></span>
</div>
<div id="progressBar"><div id="progressFill"></div></div>
<div id="achieve"></div>
<div id="boardWrap">
  <div id="boardBg"></div>
  <div id="tiles"></div>
</div>
<div id="btns">
  <button id="up">▲</button><button id="left">◀</button>
  <button id="right">▶</button><button id="down">▼</button>
</div>
<div id="modeBtns">
  <button id="modeNormal" class="active" onclick="setMode('normal')">♾ Обычный</button>
  <button id="modeBlitz" onclick="setMode('blitz')">⏱ Блиц 60с</button>
</div>
<div id="skinBtns">
  <button id="skinDark" onclick="setSkin('')">🌙 Тёмная</button>
  <button id="skinLight" onclick="setSkin('light')">☀️ Светлая</button>
  <button id="skinPurple" onclick="setSkin('purple')">💜 Фиолетовая</button>
</div>
<button onclick="undo()" style="margin-top:6px;background:#252540;color:#ccc;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:11px">↩ Отменить ход</button>
<div id="hint">Свайпай или жми кнопки</div>
<div id="over">
  <h2 id="overTitle">жто не не!</h2>
  <p>Счёт: <b id="fs">0</b></p>
  <p>👣 Ходов: <b id="fm">0</b></p>
  <p>📦 Блок: <b id="fb2">-</b></p>
  <p>🔥 Лучший: <b id="fb">0</b></p>
  <button onclick="restart()">🔄 Ещё раз</button>
  <button class="share" onclick="share()">📤 Поделиться</button>
</div>
<canvas id="fireworks"></canvas>

<script>
const ACH={128:'🔥 Огонь!',256:'🤡 Мастер!',512:'🧠 Гений!',1024:'👽 Космос!',2048:'🃏 ЛОЛЫЧ!'};
const WORD=['ЙО!','ХА!','УХ!','ОГО!','МОЩНО!','67!','WTF!'];
function rw(){return WORD[Math.floor(Math.random()*WORD.length)]}

let board,score,best=parseInt(localStorage.getItem('lolych2048_best')||'0');
let bestBlock=0,dead=false,history=[],moves=0,mode='normal';
let timerSec=0,timerInterval=null;
let tileElements={}; // id -> DOM element

const T=document.getElementById('tiles'),scEl=document.getElementById('score'),bestEl=document.getElementById('best');
const tileEl=document.getElementById('bestTile'),achEl=document.getElementById('achieve');
const movesEl=document.getElementById('moves'),progressEl=document.getElementById('progressFill');
const timerEl=document.getElementById('timer');
const overEl=document.getElementById('over'),fsEl=document.getElementById('fs'),fbEl=document.getElementById('fb'),fb2El=document.getElementById('fb2'),fmEl=document.getElementById('fm'),overTitle=document.getElementById('overTitle');
bestEl.textContent=best;

// Один AudioContext на всю игру
let AC=null;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC}
function beep(f,d=.04,v=.04,t='sine'){
  try{const a=getAC();const o=a.createOscillator();const g=a.createGain();o.type=t;o.connect(g);g.connect(a.destination);o.frequency.value=f;g.gain.setValueAtTime(v,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.start();o.stop(a.currentTime+d)}catch(e){}
}
function sndMove(){beep(300,.04,.03)}
function sndMerge(v){beep(400+v*10,.06,.05,'triangle');setTimeout(()=>beep(600+v*10,.06,.04,'triangle'),.06)}
function sndEnd(){beep(100,.2,.08,'sawtooth')}

// Счётчик-попап
function showScorePopup(x,y,val){
  const p=document.createElement('div');p.id='scorePopup';p.textContent='+'+val;
  p.style.left=x+'px';p.style.top=y+'px';document.body.appendChild(p);
  setTimeout(()=>p.remove(),800);
}

// Фейерверк
let fireworks=[];
function launchFireworks(){
  const c=document.getElementById('fireworks');c.width=window.innerWidth;c.height=window.innerHeight;
  for(let i=0;i<8;i++)fireworks.push({x:window.innerWidth/2+(Math.random()-.5)*300,y:window.innerHeight/2+(Math.random()-.5)*300,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-4,life:1,color:`hsl(${Math.random()*360},100%,60%)`});
  if(fireworks.length>0)requestAnimationFrame(animFireworks);
}
function animFireworks(){
  const c=document.getElementById('fireworks');const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  fireworks=fireworks.filter(f=>f.life>0);
  fireworks.forEach(f=>{f.x+=f.vx;f.y+=f.vy;f.vy+=.15;f.life-=.015;ctx.beginPath();ctx.arc(f.x,f.y,3,0,Math.PI*2);ctx.fillStyle=f.color;ctx.globalAlpha=f.life;ctx.fill()});
  ctx.globalAlpha=1;
  if(fireworks.length>0)requestAnimationFrame(animFireworks);
}

// Генератор ID
let tileIdCounter=0;
function genId(){return 't'+(tileIdCounter++)}

// Игра
function init(){
  board=Array(4).fill().map(()=>Array(4).fill(0));
  score=0;bestBlock=0;dead=false;history=[];moves=0;tileElements={};tileIdCounter=0;
  overEl.style.display='none';achEl.textContent='';tileEl.textContent='-';movesEl.textContent='0';
  scEl.textContent=score;progressEl.style.width='0%';timerEl.textContent='';
  if(mode==='blitz'){timerSec=60;timerEl.textContent='⏱ 60с';startTimer()}
  add();add();renderTiles();
}
function startTimer(){
  clearInterval(timerInterval);timerEl.style.color='#ffd93d';
  timerInterval=setInterval(()=>{
    timerSec--;timerEl.textContent='⏱ '+timerSec+'с';
    if(timerSec<=10)timerEl.style.color='#e94560';
    if(timerSec<=0){clearInterval(timerInterval);end('⏱ Время вышло!')}
  },1000);
}
function add(){
  const empty=[];board.forEach((r,y)=>r.forEach((v,x)=>{if(!v)empty.push([y,x])}));
  if(empty.length){const [y,x]=empty[Math.floor(Math.random()*empty.length)];board[y][x]={val:1,id:genId()}}
}

// Плавный рендер через transform
function renderTiles(){
  const gap=6,size=68;
  // Удаляем старые элементы которых нет на доске
  const currentIds=new Set();
  board.forEach(r=>r.forEach(cell=>{if(cell)currentIds.add(cell.id)}));
  for(const[id,el]of Object.entries(tileElements)){
    if(!currentIds.has(id)){el.addEventListener('transitionend',()=>el.remove(),{once:true});el.style.opacity='0';delete tileElements[id]}
  }
  // Обновляем/создаём
  board.forEach((r,y)=>r.forEach((cell,x)=>{
    if(!cell)return;
    const val=Math.pow(2,cell.val);
    const newX=x*(size+gap),newY=y*(size+gap);
    if(tileElements[cell.id]){
      const el=tileElements[cell.id];
      el.style.transform=`translate(${newX}px,${newY}px)`;
      el.textContent=val;el.setAttribute('data-v',val);
      if(val>=128)el.classList.add('glow');else el.classList.remove('glow');
    }else{
      const el=document.createElement('div');el.className='tile new';
      el.textContent=val;el.setAttribute('data-v',val);
      el.style.transform=`translate(${newX}px,${newY}px)`;
      if(val>=128)el.classList.add('glow');
      T.appendChild(el);
      tileElements[cell.id]=el;
      setTimeout(()=>el.classList.remove('new'),250);
    }
  }));
}

function updateProgress(){
  progressEl.style.width=Math.min(100,Math.floor((bestBlock/11)*100))+'%';
}

function move(dir){
  if(dead)return;
  const snapshot={board:board.map(r=>r.map(c=>c?{val:c.val,id:c.id}:null)),score,bestBlock,moves};
  if(history.length>50)history.shift();
  history.push(snapshot);
  let moved=false,merged=false;
  const oldStr=JSON.stringify(board);
  // Поворот чтобы всегда двигать влево
  for(let r=0;r<dir;r++)board=board[0].map((_,i)=>board.map(row=>row[i]).reverse());
  for(let y=0;y<4;y++){
    let row=board[y].filter(v=>v);
    for(let x=0;x<row.length-1;x++){
      if(row[x].val===row[x+1].val){
        row[x].val++;const val=Math.pow(2,row[x].val);score+=val*(mode==='blitz'?2:1);merged=true;
        // Показываем попап
        const el=tileElements[row[x].id];
        if(el){const rect=el.getBoundingClientRect();showScorePopup(rect.left+rect.width/2,rect.top,'+'+val)}
        if(row[x].val>bestBlock){bestBlock=row[x].val;tileEl.textContent=Math.pow(2,bestBlock);updateProgress()}
        if(row[x].val===11){launchFireworks();overTitle.textContent='🃏 ЛОЛЫЧ!'}
        if(ACH[val]){achEl.textContent=ACH[val]+' '+rw();setTimeout(()=>achEl.textContent='',2000)}
        sndMerge(row[x].val);
        // Удаляем поглощённую плитку
        if(tileElements[row[x+1].id]){const el=tileElements[row[x+1].id];el.style.opacity='0';el.addEventListener('transitionend',()=>el.remove(),{once:true});delete tileElements[row[x+1].id]}
        row[x].id=genId();row.splice(x+1,1);row.push(null);moved=true;
      }
    }
    while(row.length<4)row.push(null);board[y]=row;
  }
  for(let r=0;r<(4-dir)%4;r++)board=board[0].map((_,i)=>board.map(row=>row[i]).reverse());
  if(JSON.stringify(board)!==oldStr){
    moves++;movesEl.textContent=moves;
    if(!merged)sndMove();add();renderTiles();scEl.textContent=score;
  }
  if(checkEnd())end('💀 Конец!');
}

function undo(){
  if(dead||history.length===0)return;
  const prev=history.pop();board=prev.board;score=prev.score;bestBlock=prev.bestBlock;moves=prev.moves;
  scEl.textContent=score;movesEl.textContent=moves;tileEl.textContent=bestBlock?Math.pow(2,bestBlock):'-';updateProgress();
  dead=false;overEl.style.display='none';clearInterval(timerInterval);
  // Очищаем и перерисовываем
  for(const[id,el]of Object.entries(tileElements))el.remove();
  tileElements={};tileIdCounter=0;
  board.forEach(r=>r.forEach(c=>{if(c)c.id=genId()}));
  renderTiles();
  if(mode==='blitz'){timerSec=prev.timerSec||60;timerEl.textContent='⏱ '+timerSec+'с';startTimer()}
  beep(200,.05,.04);
}

function checkEnd(){
  for(let y=0;y<4;y++)for(let x=0;x<4;x++){
    if(!board[y][x])return false;
    if(x<3&&board[y][x]&&board[y][x+1]&&board[y][x].val===board[y][x+1].val)return false;
    if(y<3&&board[y][x]&&board[y+1][x]&&board[y][x].val===board[y+1][x].val)return false;
  }
  return true;
}
function end(title){
  dead=true;clearInterval(timerInterval);sndEnd();
  if(score>best){best=score;localStorage.setItem('lolych2048_best',best);bestEl.textContent=best}
  fsEl.textContent=score;fbEl.textContent=best;fmEl.textContent=moves;
  fb2El.textContent=bestBlock?Math.pow(2,bestBlock):'-';
  overTitle.textContent=title;overEl.style.display='flex';
}
function restart(){init()}
function share(){
  window.open(`https://t.me/share/url?url=https://t.me/Lolych_bot&text=${encodeURIComponent(`🎮 Лолыч 2048! Счёт: ${score} (рекорд: ${best}). Играй: @Lolych_bot`)}`);
}
function setMode(m){
  mode=m;document.getElementById('modeNormal').classList.toggle('active',m==='normal');
  document.getElementById('modeBlitz').classList.toggle('active',m==='blitz');restart();
}
function setSkin(s){document.body.className=s;localStorage.setItem('lolych2048_skin',s)}

// Кнопки
document.getElementById('up').addEventListener('click',()=>move(3));
document.getElementById('down').addEventListener('click',()=>move(1));
document.getElementById('left').addEventListener('click',()=>move(0));
document.getElementById('right').addEventListener('click',()=>move(2));
// Свайпы
let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});
document.addEventListener('touchend',e=>{
  if(dead)return;
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)<25&&Math.abs(dy)<25)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?2:0);else move(dy>0?1:3);
},{passive:true});
// Клавиатура
document.addEventListener('keydown',e=>{
  if(dead)return;
  if(e.key==='ArrowLeft'){e.preventDefault();move(0)}
  if(e.key==='ArrowRight'){e.preventDefault();move(2)}
  if(e.key==='ArrowUp'){e.preventDefault();move(3)}
  if(e.key==='ArrowDown'){e.preventDefault();move(1)}
  if(e.key==='z'&&e.ctrlKey){e.preventDefault();undo()}
});
// Фон доски
const bgEl=document.getElementById('boardBg');
for(let i=0;i<16;i++){const c=document.createElement('div');c.className='bgCell';bgEl.appendChild(c)}
// Скин
setSkin(localStorage.getItem('lolych2048_skin')||'');
init();
</script>
</body>
</html>
