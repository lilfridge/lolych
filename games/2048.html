<!DOCTYPE html>
<html>
<head>
<title>2048</title>
<style>
body{margin:0;background:#faf8ef;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Arial}
#game{width:320px;height:320px;background:#bbada0;border-radius:6px;display:grid;grid-template:repeat(4,1fr)/repeat(4,1fr);gap:8px;padding:8px}
.tile{background:#cdc1b4;display:flex;justify-content:center;align-items:center;font-size:32px;font-weight:bold;border-radius:4px;color:#776e65}
.tile[data-value="2"]{background:#eee4da}.tile[data-value="4"]{background:#ede0c8}.tile[data-value="8"]{background:#f2b179;color:#f9f6f2}.tile[data-value="16"]{background:#f59563;color:#f9f6f2}.tile[data-value="32"]{background:#f67c5f;color:#f9f6f2}.tile[data-value="64"]{background:#f65e3b;color:#f9f6f2}.tile[data-value="128"]{background:#edcf72;color:#f9f6f2;font-size:28px}.tile[data-value="256"]{background:#edcc61;color:#f9f6f2;font-size:28px}.tile[data-value="512"]{background:#edc850;color:#f9f6f2;font-size:28px}.tile[data-value="1024"]{background:#edc53f;color:#f9f6f2;font-size:24px}.tile[data-value="2048"]{background:#edc22e;color:#f9f6f2;font-size:24px}
</style>
</head>
<body>
<div id="game"></div>
<script>
let board=Array(4).fill().map(()=>Array(4).fill(0));
function addTile(){const empty=[];board.forEach((r,i)=>r.forEach((c,j)=>{if(c===0)empty.push({i,j})}));if(empty.length){const {i,j}=empty[Math.floor(Math.random()*empty.length)];board[i][j]=Math.random()<0.9?2:4}}
function draw(){const g=document.getElementById('game');g.innerHTML='';board.forEach(r=>r.forEach(v=>{const t=document.createElement('div');t.className='tile';if(v>0){t.textContent=v;t.setAttribute('data-value',v)}g.appendChild(t)}))}
function move(dir){let moved=false;const old=JSON.parse(JSON.stringify(board));
const rotate=(b)=>{const n=Array(4).fill().map(()=>Array(4).fill(0));for(let i=0;i<4;i++)for(let j=0;j<4;j++)n[j][3-i]=b[i][j];return n}
if(dir===0)board=rotate(rotate(board));if(dir===1)board=rotate(rotate(rotate(board)));if(dir===3)board=rotate(board);
for(let i=0;i<4;i++){let row=board[i].filter(v=>v);for(let j=0;j<row.length-1;j++){if(row[j]===row[j+1]){row[j]*=2;row.splice(j+1,1);row.push(0);moved=true}}while(row.length<4)row.push(0);board[i]=row}
if(dir===0)board=rotate(rotate(board));if(dir===1)board=rotate(board);if(dir===3)board=rotate(rotate(rotate(board)));
if(JSON.stringify(board)!==old){addTile();draw()}}
addTile();addTile();draw();
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')move(0);if(e.key==='ArrowRight')move(2);if(e.key==='ArrowUp')move(1);if(e.key==='ArrowDown')move(3)});
</script>
</body>
</html>
