cd ~/Desktop/lolych/games
cat > blockblast.html << 'ENDOFGAME'
<!DOCTYPE html>
<html>
<head>
<title>Лолыч-Бласт</title>
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:Arial;overflow:hidden}
#header span{color:#fff;font-size:28px}
#score{color:#fff;font-size:16px;text-align:center;margin:5px 0}
#combo{color:#e94560;font-size:14px;text-align:center;height:20px}
#game{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;background:#111;padding:4px;border-radius:8px;width:min(90vw,380px);height:min(90vw,380px)}
.cell{background:#1a1a1a;border-radius:3px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:20px;transition:all 0.15s}
.cell.filled{background:#1a3a2a;animation:pop 0.2s}
#pieces{display:flex;gap:10px;margin:12px 0;justify-content:center;flex-wrap:wrap}
.piece{display:grid;gap:2px;background:#111;padding:6px;border-radius:8px;cursor:pointer;border:2px solid transparent}
.piece.selected{border-color:#e94560}
.piece .pcell{width:24px;height:24px;background:#1a1a1a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px}
.piece .pcell.active{background:#1a3a2a}
#phrase{color:#e94560;font-size:18px;text-align:center;height:30px;margin:5px 0}
#gameover{color:#fff;text-align:center;display:none;position:absolute;background:rgba(0,0,0,0.9);width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center}
#gameover h2{font-size:28px;margin-bottom:10px}
#gameover p{font-size:16px;margin:5px 0}
#gameover button{background:#e94560;color:#fff;border:none;padding:12px 30px;font-size:16px;border-radius:8px;margin:8px;cursor:pointer}
#gameover .share{background:#25D366}
@keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="header"><span>🃏 Лолыч-Бласт</span></div>
<div id="score">🏆 <span id="sc">0</span> | 🔥 Рекорд: <span id="best">0</span></div>
<div id="combo"></div>
<div id="game"></div>
<div id="phrase"></div>
<div id="pieces"></div>
<div id="gameover">
<h2>жто не не!</h2>
<p>Счёт: <span id="finalscore">0</span></p>
<p>🔥 Лучший: <span id="finalbest">0</span></p>
<button onclick="restart()">🔄 Ещё раз</button>
<button class="share" onclick="share()">📤 В чат</button>
</div>
<script>
const SIZE=8;
const EMOJIS=['💀','🗿','🤡','🔥','😭','👀','💩','🧠','🫠','🫃','🧌','☠️'];
const PHRASES=['СГЛЫПА!','67!','жто не не!','WTF!','ЛОЛЫЧ!','МОЩНО!','АБСУРД!','🤡'];

// Все фигуры во всех ориентациях (51 фигура)
const ALL_SHAPES=[
[[1]], // 1. точка
[[1,1]], // 2. линия 2 гориз
[[1],[1]], // линия 2 верт
[[1,1,1]], // 3. линия 3 гориз
[[1],[1],[1]], // линия 3 верт
[[1,1,1,1]], // 4. линия 4 гориз
[[1],[1],[1],[1]], // линия 4 верт
[[1,1,1,1,1]], // 5. линия 5 гориз
[[1],[1],[1],[1],[1]], // линия 5 верт
[[1,1],[1,1]], // 6. квадрат 2x2
[[1,1,1],[1,1,1]], // 7. прямоуг 2x3 гориз
[[1,1],[1,1],[1,1]], // прямоуг 2x3 верт
[[1,1,1],[1,1,1],[1,1,1]], // 8. квадрат 3x3
[[1,0],[1,1]], // 9. малый L (вверх)
[[0,1],[1,1]], // 10. малый J (вверх)
[[1,1],[1,0]], // малый L (вниз)
[[1,1],[0,1]], // малый J (вниз)
[[1,0],[1,0],[1,1]], // 11. L (вверх)
[[0,1],[0,1],[1,1]], // 12. J (вверх)
[[1,1],[1,0],[1,0]], // L (вправо)
[[1,1],[0,1],[0,1]], // J (вправо)
[[1,1,1],[1,0,0]], // L (вниз)
[[1,1,1],[0,0,1]], // J (вниз)
[[0,0,1],[1,1,1]], // L (влево)
[[1,0,0],[1,1,1]], // J (влево)
[[1,0,0],[1,0,0],[1,1,1]], // 13. большой L (вверх)
[[0,0,1],[0,0,1],[1,1,1]], // 14. большой J (вверх)
[[1,1,1],[1,0,0],[1,0,0]], // большой L (вправо)
[[1,1,1],[0,0,1],[0,0,1]], // большой J (вправо)
[[1,1,1],[0,1,0]], // 15. T (вверх)
[[0,1,0],[1,1,1]], // 16. перевернутый T
[[1,0],[1,1],[1,0]], // 17. T влево
[[0,1],[1,1],[0,1]], // 18. T вправо
[[0,1,1],[1,1,0]], // 19. S
[[1,1,0],[0,1,1]], // 20. Z
[[1,0],[1,1],[0,1]], // 21. верт S
[[0,1],[1,1],[1,0]], // 22. верт Z
[[1,0,1],[1,1,1]], // 23. U
[[1,0,0],[1,0,0],[1,1,1]], // 24. V
[[1,1],[1,1],[1,0]], // 25. P (вверх)
[[1,1],[1,1],[0,1]], // 26. зеркальная P (вверх)
[[1,1,0],[0,1,0],[0,1,0]], // 27. ступенька
[[0,1,1],[0,1,0],[0,1,0]], // 28. зеркальная ступенька
[[1,1],[1,0],[1,0]], // P вправо
[[1,1],[0,1],[0,1]], // зерк P вправо
[[0,1,0],[0,1,0],[1,1,0]], // ступенька гориз
[[0,1,0],[0,1,0],[0,1,1]], // зерк ступенька гориз
];

let board=[],score=0,combo=0,best=localStorage.getItem('lolych_best')||0,pieces=[],selIdx=-1,gameOver=false;
document.getElementById('best').textContent=best;

function createBoard(){
board=Array(SIZE).fill().map(()=>Array(SIZE).fill(0));
score=0;combo=0;selIdx=-1;gameOver=false;
document.getElementById('gameover').style.display='none';
document.getElementById('sc').textContent=score;
document.getElementById('combo').textContent='';
document.getElementById('phrase').textContent='';
renderBoard();
generatePieces();
}

function renderBoard(){
const g=document.getElementById('game');
g.innerHTML='';
for(let y=0;y<SIZE;y++)for(let x=0;x<SIZE;x++){
const cell=document.createElement('div');
cell.className='cell'+(board[y][x]?' filled':'');
cell.textContent=board[y][x]||'';
cell.addEventListener('click',()=>placePiece(x,y));
g.appendChild(cell);
}
}

function generatePieces(){
pieces=[];
for(let i=0;i<3;i++){
const shape=ALL_SHAPES[Math.floor(Math.random()*ALL_SHAPES.length)];
pieces.push({shape:shape,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)]});
}
renderPieces();
}

function renderPieces(){
const pdiv=document.getElementById('pieces');
pdiv.innerHTML='';
pieces.forEach((p,i)=>{
const div=document.createElement('div');
div.className='piece'+(i===selIdx?' selected':'');
div.style.gridTemplateColumns=`repeat(${p.shape[0].length},1fr)`;
for(let y=0;y<p.shape.length;y++)for(let x=0;x<p.shape[0].length;x++){
const c=document.createElement('div');
c.className='pcell'+(p.shape[y][x]?' active':'');
if(p.shape[y][x])c.textContent=p.emoji;
div.appendChild(c);
}
div.addEventListener('click',()=>{selIdx=i;renderPieces()});
pdiv.appendChild(div);
});
}

function placePiece(px,py){
if(selIdx<0||gameOver)return;
const {shape,emoji}=pieces[selIdx];
const h=shape.length,w=shape[0].length;
if(px+w>SIZE||py+h>SIZE)return;
for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(shape[y][x]&&board[py+y][px+x])return;
for(let y=0;y<h;y++)for(let x=0;x<w;x++)if(shape[y][x])board[py+y][px+x]=emoji;
renderBoard();
const lines=checkLines();
if(lines>0){combo++;score+=lines*10*combo;document.getElementById('phrase').textContent=PHRASES[Math.floor(Math.random()*PHRASES.length)];document.getElementById('combo').textContent=combo>1?`🔥 x${combo} комбо!`:'';setTimeout(()=>{document.getElementById('phrase').textContent='';document.getElementById('combo').textContent=''},1500)}
else{combo=0}
score+=1;
document.getElementById('sc').textContent=score;
pieces.splice(selIdx,1);selIdx=-1;
if(pieces.length===0)generatePieces();else renderPieces();
if(isGameOver())endGame();
}

function checkLines(){
let cleared=0;
for(let y=0;y<SIZE;y++)if(board[y].every(c=>c)){board[y].fill(0);cleared++}
for(let x=0;x<SIZE;x++)if(board.every(r=>r[x])){for(let y=0;y<SIZE;y++)board[y][x]=0;cleared++}
if(cleared)renderBoard();
return cleared;
}

function isGameOver(){
for(const p of pieces){
const h=p.shape.length,w=p.shape[0].length;
for(let y=0;y<=SIZE-h;y++)for(let x=0;x<=SIZE-w;x++){
let fits=true;
for(let sy=0;sy<h&&fits;sy++)for(let sx=0;sx<w&&fits;sx++)if(p.shape[sy][sx]&&board[y+sy][x+sx])fits=false;
if(fits)return false;
}
}
return true;
}

function endGame(){
gameOver=true;
if(score>best){best=score;localStorage.setItem('lolych_best',best)}
document.getElementById('gameover').style.display='flex';
document.getElementById('finalscore').textContent=score;
document.getElementById('finalbest').textContent=best;
}

function restart(){createBoard()}

function share(){
const text=encodeURIComponent(`🃏 Лолыч-Бласт!\n🏆 Мой рекорд: ${score} очков\n🔥 Лучший: ${best}\n\nИграй: @Lolych_bot`);
window.open(`https://t.me/share/url?url=https://t.me/Lolych_bot&text=${text}`);
}

createBoard();
</script>
</body>
</html>
ENDOFGAME
