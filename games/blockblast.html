<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Лолыч Бласт</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
    touch-action: manipulation;
    user-select: none;
  }
  #header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  #header .logo { font-size: 28px; }
  #header .title { color: #e94560; font-size: 22px; font-weight: bold; }
  #score-panel {
    display: flex;
    justify-content: space-between;
    width: 300px;
    color: #ccc;
    font-size: 13px;
    margin-bottom: 4px;
  }
  #combo-text {
    color: #f0c040;
    font-size: 15px;
    height: 20px;
    margin-bottom: 4px;
  }
  #game-board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    gap: 2px;
    background: #1a1a2e;
    padding: 5px;
    border-radius: 10px;
    width: 300px;
    height: 300px;
  }
  .cell {
    background: #252540;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    min-width: 0;
    min-height: 0;
    overflow: hidden;
  }
  .cell.filled {
    background: #2e4a3e;
    animation: pop 0.15s ease;
  }
  @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
  #pieces-container {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    justify-content: center;
  }
  .piece {
    display: grid;
    gap: 2px;
    background: #1a1a2e;
    padding: 6px;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border 0.2s;
  }
  .piece.selected {
    border-color: #e94560;
  }
  .piece-cell {
    width: 24px;
    height: 24px;
    background: #252540;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    box-sizing: border-box;
  }
  .piece-cell.active {
    background: #2e4a3e;
  }
  #game-over {
    display: none;
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    color: white;
  }
  #game-over h2 { font-size: 28px; color: #e94560; margin-bottom: 8px; }
  #game-over p { font-size: 16px; margin: 4px 0; }
  #game-over button {
    background: #e94560;
    color: white;
    border: none;
    padding: 10px 25px;
    font-size: 16px;
    border-radius: 8px;
    margin: 6px;
    cursor: pointer;
  }
  #game-over button.share { background: #25D366; }
</style>
</head>
<body>
<div id="header">
  <span class="logo">🃏</span>
  <span class="title">Лолыч Бласт</span>
</div>
<div id="score-panel">
  <span>🏆 <span id="score">0</span></span>
  <span>🔥 Рекорд: <span id="best">0</span></span>
</div>
<div id="combo-text"></div>
<div id="game-board"></div>
<div id="pieces-container"></div>

<div id="game-over">
  <h2>жто не не!</h2>
  <p>Счёт: <span id="final-score">0</span></p>
  <p>🔥 Лучший: <span id="final-best">0</span></p>
  <button onclick="restart()">🔄 Ещё раз</button>
  <button class="share" onclick="share()">📤 Поделиться</button>
</div>

<script>
const SIZE = 8;
const EMOJIS = ['💀','🗿','🤡','🔥','😭','👀','💩','🧠','🫠','🫃','🧌','☠️','👾','🎃','🤖','👽'];
const PHRASES = ['СГЛЫПА!','67!','жто не не!','WTF!','ЛОЛЫЧ!','МОЩНО!','АБСУРД!','🤡','ОГОНЬ!'];

// Фигуры как список координат блоков
const SHAPES = [
  [{x:0,y:0}],
  [{x:0,y:0},{x:1,y:0}], [{x:0,y:0},{x:0,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0}], [{x:0,y:0},{x:0,y:1},{x:0,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0}], [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0}], [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:0,y:3},{x:0,y:4}],
  [{x:0,y:0},{x:1,y:0},{x:0,y:1},{x:1,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1}],
  [{x:0,y:0},{x:1,y:0},{x:0,y:1},{x:1,y:1},{x:0,y:2},{x:1,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1},{x:0,y:2},{x:1,y:2},{x:2,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:0,y:1}], [{x:0,y:0},{x:0,y:1},{x:1,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:1,y:0}], [{x:0,y:0},{x:1,y:0},{x:1,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:1,y:2}], [{x:0,y:2},{x:1,y:0},{x:1,y:1},{x:1,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:1,y:2}], [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:1,y:0}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:0,y:1}], [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:2,y:1}],
  [{x:0,y:1},{x:1,y:1},{x:2,y:1},{x:2,y:0}], [{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:1,y:0},{x:1,y:1},{x:1,y:2}],
  [{x:1,y:0},{x:1,y:1},{x:1,y:2},{x:0,y:0},{x:0,y:1},{x:0,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:0,y:1},{x:0,y:2}], [{x:0,y:0},{x:1,y:0},{x:2,y:0},{x:1,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:0,y:2}], [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:1,y:2}],
  [{x:1,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1}], [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:2,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:1,y:1},{x:1,y:2}], [{x:1,y:0},{x:0,y:1},{x:1,y:1},{x:0,y:2}],
  [{x:0,y:0},{x:2,y:0},{x:0,y:1},{x:1,y:1},{x:2,y:1}],
  [{x:0,y:0},{x:0,y:1},{x:0,y:2},{x:1,y:0},{x:1,y:1}], [{x:1,y:0},{x:0,y:1},{x:1,y:1},{x:0,y:2},{x:1,y:2}],
  [{x:0,y:0},{x:1,y:0},{x:0,y:1},{x:0,y:2}], [{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:1,y:2}],
];

let board = [], score = 0, combo = 0;
let bestScore = parseInt(localStorage.getItem('lolych_best') || '0');
let pieces = [], selectedIndex = -1, gameOver = false;

const boardEl = document.getElementById('game-board');
const piecesEl = document.getElementById('pieces-container');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const comboEl = document.getElementById('combo-text');
const gameOverEl = document.getElementById('game-over');
const finalScoreEl = document.getElementById('final-score');
const finalBestEl = document.getElementById('final-best');

bestEl.textContent = bestScore;

function initGame() {
  board = Array(SIZE).fill().map(() => Array(SIZE).fill(''));
  score = 0; combo = 0; selectedIndex = -1; gameOver = false;
  gameOverEl.style.display = 'none';
  updateScore();
  renderBoard();
  pieces = [];
  while (pieces.length < 3) addPiece();
  renderPieces();
}

function addPiece() {
  const blocks = SHAPES[Math.floor(Math.random() * SHAPES.length)];
  const emoji = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
  pieces.push({ blocks, emoji });
}

function renderBoard() {
  boardEl.innerHTML = '';
  for (let y = 0; y < SIZE; y++) {
    for (let x = 0; x < SIZE; x++) {
      const cell = document.createElement('div');
      cell.className = 'cell' + (board[y][x] ? ' filled' : '');
      cell.textContent = board[y][x] || '';
      cell.addEventListener('click', () => {
        if (selectedIndex >= 0) placePiece(x, y);
      });
      boardEl.appendChild(cell);
    }
  }
}

function renderPieces() {
  piecesEl.innerHTML = '';
  pieces.forEach((p, idx) => {
    let maxX = 0, maxY = 0;
    p.blocks.forEach(b => { maxX = Math.max(maxX, b.x); maxY = Math.max(maxY, b.y); });
    const cols = maxX + 1, rows = maxY + 1;

    const div = document.createElement('div');
    div.className = 'piece' + (idx === selectedIndex ? ' selected' : '');
    div.style.gridTemplateColumns = `repeat(${cols}, 24px)`;
    div.style.gridTemplateRows = `repeat(${rows}, 24px)`;

    const grid = Array(rows).fill().map(() => Array(cols).fill(false));
    p.blocks.forEach(b => { grid[b.y][b.x] = true; });

    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        const c = document.createElement('div');
        if (grid[y][x]) {
          c.className = 'piece-cell active';
          c.textContent = p.emoji;
        } else {
          c.className = 'piece-cell';
          c.style.visibility = 'hidden';
        }
        div.appendChild(c);
      }
    }
    div.addEventListener('click', () => {
      selectedIndex = (selectedIndex === idx) ? -1 : idx;
      renderPieces();
    });
    piecesEl.appendChild(div);
  });
}

function placePiece(px, py) {
  if (selectedIndex < 0 || gameOver) return;
  const { blocks, emoji } = pieces[selectedIndex];

  for (const b of blocks) {
    const x = px + b.x, y = py + b.y;
    if (x < 0 || x >= SIZE || y < 0 || y >= SIZE || board[y][x]) return;
  }

  for (const b of blocks) {
    board[py + b.y][px + b.x] = emoji;
  }

  score += 1; combo = 0;
  pieces.splice(selectedIndex, 1);
  selectedIndex = -1;

  let cleared = 0;
  for (let y = 0; y < SIZE; y++) {
    if (board[y].every(c => c !== '')) { board[y].fill(''); cleared++; }
  }
  for (let x = 0; x < SIZE; x++) {
    if (board.every(r => r[x] !== '')) { for (let y = 0; y < SIZE; y++) board[y][x] = ''; cleared++; }
  }

  if (cleared > 0) {
    combo++;
    score += cleared * 10 * combo;
    comboEl.textContent = PHRASES[Math.floor(Math.random() * PHRASES.length)];
    setTimeout(() => comboEl.textContent = '', 1500);
  }

  updateScore();
  renderBoard();
  while (pieces.length < 3) addPiece();
  renderPieces();
  if (checkGameOver()) endGame();
}

function checkGameOver() {
  for (const p of pieces) {
    for (let y = 0; y < SIZE; y++) {
      for (let x = 0; x < SIZE; x++) {
        let fits = true;
        for (const b of p.blocks) {
          const bx = x + b.x, by = y + b.y;
          if (bx < 0 || bx >= SIZE || by < 0 || by >= SIZE || board[by][bx]) {
            fits = false; break;
          }
        }
        if (fits) return false;
      }
    }
  }
  return true;
}

function endGame() {
  gameOver = true;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('lolych_best', bestScore);
    bestEl.textContent = bestScore;
  }
  finalScoreEl.textContent = score;
  finalBestEl.textContent = bestScore;
  gameOverEl.style.display = 'flex';
}

function updateScore() { scoreEl.textContent = score; }

function restart() { pieces = []; initGame(); }

function share() {
  const text = `🃏 Лолыч Бласт! Мой рекорд: ${score} (лучший: ${bestScore}). Играй: @Lolych_bot`;
  window.open(`https://t.me/share/url?url=https://t.me/Lolych_bot&text=${encodeURIComponent(text)}`);
}

initGame();
</script>
</body>
</html>
